<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Take a quick photo and answer some questions to match with a cat!">
  <meta property="og:title" content="ohh feelings">
  <meta property="og:description" content="Find out which cat matches your personality!">
  <meta property="og:type" content="website">
  <title>ohh feelings</title>
  <link href="https://fonts.googleapis.com/css2?family=Chewy&family=Nunito:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #151515;
      --card: #dedad5;
      --text: #f0ece8;
      --muted: #7a7672;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: var(--bg);
      overflow: hidden;
    }

    body {
      font-family: 'Nunito', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .screen {
      width: 100vw;
      height: 100vh;
      position: relative;
      overflow: hidden;
    }

    /* ─── HERO ─── */
    .hero {
      position: absolute;
      top: 13vh;
      left: 0; right: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: clamp(10px, 1.4vh, 36px);
      padding: 0 clamp(24px, 11vw, 160px);
      text-align: center;
      z-index: 10;
    }

    h1 {
      font-family: 'Chewy', cursive;
      font-weight: 400;
      font-size: clamp(52px, 10.8vw, 156px);
      color: var(--text);
      line-height: 1;
      letter-spacing: 0.02em;
      opacity: 0;
      animation: fadeUp 0.9s 0.1s cubic-bezier(0.16,1,0.3,1) forwards;
    }

    .subtitle {
      font-family: 'Nunito', sans-serif;
      font-size: clamp(14px, 3.2vw, 46px);
      font-weight: 300;
      color: var(--muted);
      line-height: 1.55;
      max-width: clamp(240px, 54vw, 780px);
      opacity: 0;
      animation: fadeUp 0.9s 0.28s cubic-bezier(0.16,1,0.3,1) forwards;
    }

    /* ─── START BUTTON ─── */
    .btn-wrap {
      margin-top: clamp(20px, 2vh, 50px);
      opacity: 0;
      animation: fadeUp 0.9s 0.45s cubic-bezier(0.16,1,0.3,1) forwards;
    }

    .btn-start {
      display: flex;
      align-items: stretch;
      border: none;
      padding: 0;
      cursor: pointer;
      border-radius: clamp(12px, 2.5vw, 36px);
      overflow: hidden;
      background: transparent;
      transition: transform 0.2s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.2s ease;
      box-shadow: 0 clamp(4px,0.8vw,12px) clamp(20px,4vw,60px) rgba(0,0,0,0.45);
    }

    .btn-start:hover  { transform: scale(1.04); }
    .btn-start:active { transform: scale(0.97); }

    .btn-icon {
      background: #111;
      width: clamp(52px, 11.8vw, 170px);
      aspect-ratio: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .btn-icon svg {
      width: clamp(22px, 5vw, 80px);
      height: clamp(22px, 5vw, 80px);
      fill: var(--text);
    }

    .btn-label {
      background: var(--card);
      color: #151515;
      font-family: 'Chewy', cursive;
      font-size: clamp(18px, 3.8vw, 56px);
      font-weight: 400;
      letter-spacing: 0.04em;
      padding: 0 clamp(28px, 8.3vw, 120px);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ─── SCATTERED CAT CARDS ─── */
    .cards-area {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 62vh;
      pointer-events: none;
    }

    .cat-card {
      position: absolute;
      background: var(--card);
      border-radius: clamp(14px, 3.6vw, 52px);
      overflow: hidden;
      opacity: 0;
    }

    .cat-card:nth-child(1) {
      width: clamp(120px, 40.3vw, 580px); aspect-ratio: 1;
      left: 4.7vw; top: 2.8%;
      --r: -8deg;
      animation: cardIn 0.7s 0.56s cubic-bezier(0.16,1,0.3,1) forwards;
    }
    .cat-card:nth-child(2) {
      width: clamp(110px, 37.5vw, 540px); aspect-ratio: 1;
      left: 51.4vw; top: 0.9%;
      --r: 2deg;
      animation: cardIn 0.7s 0.64s cubic-bezier(0.16,1,0.3,1) forwards;
    }
    .cat-card:nth-child(3) {
      width: clamp(105px, 35.4vw, 510px); aspect-ratio: 1;
      right: 1vw; top: 20.8%;
      --r: -5deg;
      animation: cardIn 0.7s 0.72s cubic-bezier(0.16,1,0.3,1) forwards;
    }
    .cat-card:nth-child(4) {
      width: clamp(115px, 39.6vw, 570px); aspect-ratio: 1;
      left: 10.4vw; top: 28.3%;
      --r: 4deg;
      animation: cardIn 0.7s 0.80s cubic-bezier(0.16,1,0.3,1) forwards;
    }
    .cat-card:nth-child(5) {
      width: clamp(100px, 34vw, 490px); aspect-ratio: 1;
      left: 1.9vw; top: 56.6%;
      --r: -5deg;
      animation: cardIn 0.7s 0.88s cubic-bezier(0.16,1,0.3,1) forwards;
    }
    .cat-card:nth-child(6) {
      width: clamp(104px, 34.7vw, 500px); aspect-ratio: 1;
      left: 34vw; top: 59.2%;
      --r: 3deg;
      animation: cardIn 0.7s 0.96s cubic-bezier(0.16,1,0.3,1) forwards;
    }
    .cat-card:nth-child(7) {
      width: clamp(108px, 36.1vw, 520px); aspect-ratio: 1;
      right: 0.5vw; top: 55.3%;
      --r: -6deg;
      animation: cardIn 0.7s 1.04s cubic-bezier(0.16,1,0.3,1) forwards;
    }

    .cat-card::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(145deg, #e2ddd8 0%, #cac6c1 100%);
    }

    .cat-card img {
      position: absolute;
      inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      z-index: 1;
    }

    /* ─── ANIMATIONS ─── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(clamp(14px,2vh,48px)); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(clamp(30px,5vh,120px)) rotate(var(--r)) scale(0.88); }
      to   { opacity: 1; transform: translateY(0) rotate(var(--r)) scale(1); }
    }

    /* ─── BREAKPOINTS ─── */
    @media (max-width: 480px) {
      .hero { top: 10vh; gap: 10px; }
      .cards-area { height: 58vh; }
    }
    @media (min-width: 481px) and (max-width: 1024px) {
      .hero { top: 12vh; }
      .cards-area { height: 60vh; }
    }
    @media (min-width: 1025px) and (orientation: landscape) {
      .hero { top: 8vh; gap: 12px; }
      .cards-area { height: 55vh; }
    }
    @media (min-width: 1400px) and (orientation: portrait) {
      .hero { top: 13vh; }
      .cards-area { height: 62vh; }
    }
  </style>
</head>
<body>
<div class="screen">

  <div class="hero">
    <h1>ohh feelings</h1>
    <p class="subtitle">take a quick photo of yourself and answer some questions to match with a cat</p>
    <div class="btn-wrap">
      <button class="btn-start">
        <span class="btn-icon">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 14c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4zm-4-6a2 2 0 1 0 0-4 2 2 0 0 0 0 4zm8 0a2 2 0 1 0 0-4 2 2 0 0 0 0 4zm-4-4a2 2 0 1 0 0-4 2 2 0 0 0 0 4z"/>
          </svg>
        </span>
        <span class="btn-label">Start</span>
      </button>
    </div>
  </div>

  <div class="cards-area">
    <!-- Replace src="" with your cat PNG paths, e.g. src="cat1.png" -->
    <div class="cat-card"><img src="" alt="cat 1" onerror="this.style.display='none'"></div>
    <div class="cat-card"><img src="" alt="cat 2" onerror="this.style.display='none'"></div>
    <div class="cat-card"><img src="" alt="cat 3" onerror="this.style.display='none'"></div>
    <div class="cat-card"><img src="" alt="cat 4" onerror="this.style.display='none'"></div>
    <div class="cat-card"><img src="" alt="cat 5" onerror="this.style.display='none'"></div>
    <div class="cat-card"><img src="" alt="cat 6" onerror="this.style.display='none'"></div>
    <div class="cat-card"><img src="" alt="cat 7" onerror="this.style.display='none'"></div>
  </div>

</div>
</body>
</html>
