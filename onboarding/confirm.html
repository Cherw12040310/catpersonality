<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Probablyy a cat — Let's go</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../shared/shared.css">
  <style>
    .card-wrap {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: clamp(16px, 4vw, 40px);
      padding-top: clamp(100px, 18vh, 180px);
    }

    .card-icon img {
      width: 60px;
      height: 60px;
    }

    .card {
      background: #111;
      border-radius: clamp(20px, 4vw, 40px);
      padding: clamp(48px, 8vw, 80px) clamp(24px, 4.5vw, 52px);
      width: 100%;
      max-width: clamp(300px, 80vw, 600px);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: clamp(20px, 3.5vh, 40px);
      opacity: 0;
      animation: popUp 0.5s 0.2s cubic-bezier(0.34,1.56,0.64,1) forwards;
    }

    .card-text {
      font-size: clamp(16px, 3.8vw, 36px);
      font-weight: 400;
      color: #f0ece8;
      text-align: center;
      line-height: 1.5;
      max-width: clamp(220px, 60vw, 480px);
    }

    @media (max-width: 375px) {
      .card { padding: 24px 20px; gap: 16px; }
      .card-text { font-size: 4.2vw; }
    }

    @media (min-width: 1400px) and (orientation: portrait) {
      .card { max-width: 700px; }
    }
  </style>
</head>
<body>

  <img src="../images/ui/1.svg" class="bg-image" alt="">

  <div class="progress-path" id="navPath"></div>

  <div class="card-wrap">
    <div class="card">
      <div class="card-icon">
        <img src="../images/ui/icons8-quiz-100.png" alt="Quiz Icon">
      </div>
      <p class="card-text">Let's take a 2 minute quiz to learn about your daily habits to match a cat</p>
      <button class="btn-primary" id="confirmBtn">complete quiz</button>
    </div>
  </div>

  <script src="../shared/shared.js"></script>
  <script>
    initNav();
    document.getElementById('confirmBtn').addEventListener('click', () => {
      const btn = document.getElementById('confirmBtn');
      btn.style.background = '#c8c8c8';
      btn.style.transform = 'scale(0.98)';
      setTimeout(() => {
        window.location.href = '../quiz/quiz.html';
      }, 300);
    });
  </script>

</body>
</html>
