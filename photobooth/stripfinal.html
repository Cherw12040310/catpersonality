<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Probablyy a cat — Your Strip</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../shared/shared.css">
  <style>
    .page {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: clamp(16px, 4vw, 40px);
      padding-top: clamp(110px, 18vh, 180px);
      padding-bottom: clamp(16px, 3vh, 40px);
      gap: clamp(16px, 3vh, 28px);
    }

    .photo-strip {
      background: var(--cat-color, #c5caf0);
      border-radius: clamp(12px, 2.5vw, 20px);
      padding: clamp(8px, 1.5vw, 16px);
      display: flex;
      flex-direction: column;
      gap: clamp(6px, 1vw, 12px);
      width: clamp(120px, 34vw, 240px);
      opacity: 0;
      animation: fadeIn 0.6s 0.1s ease forwards;
      position: relative;
    }

    .strip-photo {
      width: 100%;
      aspect-ratio: 4/3;
      border-radius: clamp(6px, 1.2vw, 12px);
      background: #dde0f0;
      overflow: hidden;
    }

    .strip-photo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transform: scaleX(-1);
    }

    .strip-cat-wrap {
      width: 100%;
      display: flex;
      justify-content: center;
      padding-top: clamp(2px, 0.5vw, 6px);
      padding-bottom: clamp(4px, 0.8vw, 8px);
    }

    .strip-cat {
      width: 80%;
      height: auto;
      display: block;
    }

    .strip-credit {
      font-family: 'Outfit', sans-serif;
      font-size: 8px;
      color: rgba(0,0,0,0.4);
      text-align: right;
      padding: 0 4px 4px 0;
    }

    .btn-group {
  display: flex;
  flex-direction: column;
  gap: clamp(10px, 2vh, 16px);
  width: 100%;
  max-width: clamp(300px, 80vw, 600px);
  opacity: 0;
  animation: fadeIn 0.6s 0.4s ease forwards;
}

.btn-group .btn-primary {
  border: 2.5px solid #111;
}

.btn-group .btn-primary:active {
  background: #111;
  color: #fff;
  transform: scale(0.98);
}

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <img src="../images/ui/1.svg" class="bg-image" alt="">

  <div class="progress-path" id="navPath"></div>

  <div class="page">
    <div class="photo-strip" id="photoStrip">
      <div class="strip-photo" id="stripPhoto0"></div>
      <div class="strip-photo" id="stripPhoto1"></div>
      <div class="strip-photo" id="stripPhoto2"></div>
      <div class="strip-cat-wrap" id="stripCatWrap">
        <img class="strip-cat" id="stripCat" src="" alt="your cat">
      </div>
      <p class="strip-credit">@Probably a cat photobooth</p>
    </div>

    <div class="btn-group">
      <button class="btn-primary" id="saveBtn">save to photo</button>
      <button class="btn-primary" id="nextBtn">complete</button>
    </div>
  </div>

  <canvas id="finalCanvas" style="display:none"></canvas>

  <script src="../shared/shared.js"></script>
  <script>
    initNav();

    const CAT_TRANSPARENT = {
      american_shorthair: '../images/cats/americanshorthairtransparent.png',
      british_shorthair:  '../images/cats/britishshorthairtransparent.PNG',
      maincoon:           '../images/cats/maincoontransparent.PNG',
      birman:             '../images/cats/birmantransparent.PNG',
      ragdoll:            '../images/cats/ragdolltransparent.PNG',
      tabby:              '../images/cats/tabbytransparent.PNG',
      tuxedo:             '../images/cats/texudotransparent.PNG'
    };

    const catColor  = sessionStorage.getItem('catColor') || '#c5caf0';
    const winnerKey = sessionStorage.getItem('catResult') || 'tabby';
    const photos    = JSON.parse(sessionStorage.getItem('photos') || '[]');

    document.documentElement.style.setProperty('--cat-color', catColor);

    const transparentSrc = CAT_TRANSPARENT[winnerKey];
    const stripCatEl     = document.getElementById('stripCat');
    const stripCatWrap   = document.getElementById('stripCatWrap');

    if (transparentSrc) {
      stripCatEl.src = transparentSrc;
    } else {
      stripCatWrap.style.display = 'none';
    }

    photos.forEach((dataUrl, i) => {
      if (!dataUrl) return;
      const slot = document.getElementById('stripPhoto' + i);
      const img  = document.createElement('img');
      img.src    = dataUrl;
      slot.appendChild(img);
    });

    document.getElementById('nextBtn').addEventListener('click', () => {
      const btn = document.getElementById('nextBtn');
      btn.style.background = '#c8c8c8';
      btn.style.transform = 'scale(0.98)';
      setTimeout(() => {
        window.location.href = 'end.html';
      }, 300);
    });

    document.getElementById('saveBtn').addEventListener('click', () => {
      const finalCanvas = document.getElementById('finalCanvas');
      const W = 660, H = 1980;
      finalCanvas.width  = W;
      finalCanvas.height = H;
      const ctx = finalCanvas.getContext('2d');

      ctx.fillStyle = catColor;
      ctx.fillRect(0, 0, W, H);

      const slots = [
        { x: 30, y: 30,  w: 600, h: 450 },
        { x: 30, y: 510, w: 600, h: 450 },
        { x: 30, y: 990, w: 600, h: 450 }
      ];

      let loaded = 0;
      const imgs = [];

      if (!photos || photos.length === 0) { download(); return; }

      photos.forEach((dataUrl, i) => {
        if (!dataUrl) { loaded++; check(); return; }
        const img = new Image();
        img.onload = () => { imgs[i] = img; loaded++; check(); };
        img.src = dataUrl;
      });

      function check() {
        if (loaded < 3) return;
        imgs.forEach((img, i) => {
          if (!img) return;
          const s = slots[i];
          ctx.save();
          roundRect(ctx, s.x, s.y, s.w, s.h, 16);
          ctx.clip();
          ctx.drawImage(img, s.x, s.y, s.w, s.h);
          ctx.restore();
        });
        if (transparentSrc) {
          const catImg = new Image();
          catImg.onload = () => {
            const cw = 400;
            const ch = cw * (catImg.height / catImg.width);
            ctx.drawImage(catImg, (W - cw) / 2, H - ch - 20, cw, ch);
            download();
          };
          catImg.src = transparentSrc;
        } else {
          download();
        }
      }

      function download() {
        finalCanvas.toBlob(blob => {
          const a = document.createElement('a');
          a.href = URL.createObjectURL(blob);
          a.download = 'probablyy-a-cat-strip.png';
          a.click();
        }, 'image/png');
      }

      function roundRect(ctx, x, y, w, h, r) {
        ctx.beginPath();
        ctx.moveTo(x + r, y);
        ctx.lineTo(x + w - r, y);
        ctx.quadraticCurveTo(x + w, y, x + w, y + r);
        ctx.lineTo(x + w, y + h - r);
        ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
        ctx.lineTo(x + r, y + h);
        ctx.quadraticCurveTo(x, y + h, x, y + h - r);
        ctx.lineTo(x, y + r);
        ctx.quadraticCurveTo(x, y, x + r, y);
        ctx.closePath();
      }
    });
  </script>

</body>
</html>
