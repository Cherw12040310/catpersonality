<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Probablyy a cat — Photo Booth</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../shared/shared.css">
  <style>
    .card-wrap {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: clamp(16px, 4vw, 40px);
      padding-top: clamp(100px, 18vh, 180px);
    }

    .card {
      background: #111;
      border-radius: clamp(20px, 4vw, 40px);
      padding: clamp(48px, 8vw, 80px) clamp(24px, 4.5vw, 52px);
      width: 100%;
      max-width: clamp(300px, 80vw, 600px);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: clamp(20px, 3.5vh, 40px);
      opacity: 0;
      animation: popUp 0.5s 0.2s cubic-bezier(0.34,1.56,0.64,1) forwards;
    }

    .card-icon {
      width: clamp(60px, 12vw, 120px);
      height: auto;
    }

    .card-text {
      font-size: clamp(16px, 3.8vw, 36px);
      font-weight: 400;
      color: #f0ece8;
      text-align: center;
      line-height: 1.5;
      max-width: clamp(220px, 60vw, 480px);
    }

    .btn-group {
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 100%;
    }

    .skip-btn {
      width: 100%;
      background: transparent;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 20px;
      padding: clamp(14px, 2.5vh, 26px) clamp(20px, 4vw, 40px);
      font-family: 'Outfit', sans-serif;
      font-size: clamp(14px, 3.2vw, 30px);
      font-weight: 500;
      color: #fff;
      cursor: pointer;
      transition: background 0.2s ease, transform 0.15s ease;
    }

    .skip-btn:hover  { background: rgba(255,255,255,0.1); }
    .skip-btn:active { background: rgba(255,255,255,0.05); transform: scale(0.98); }

    @media (max-width: 375px) {
      .card { padding: 24px 20px; gap: 16px; }
      .card-text { font-size: 4.2vw; }
    }
  </style>
</head>
<body>

  <img src="../images/ui/1.svg" class="bg-image" alt="">

  <div class="progress-path" id="navPath"></div>

  <div class="card-wrap">
    <div class="card">
      <img src="../images/ui/icons8-camera-100.png" class="card-icon" alt="camera">
      <p class="card-text">Now let's take a theme photo strip picture of your cat. Grab your photo to airdrop the photo of the result</p>
      <div class="btn-group">
        <button class="btn-primary" id="nextBtn">next</button>
        <button class="skip-btn" id="skipBtn">skip</button>
      </div>
    </div>
  </div>

  <script>
    document.getElementById('nextBtn').addEventListener('click', () => {
      const btn = document.getElementById('nextBtn');
      btn.style.background = '#c8c8c8';
      btn.style.transform = 'scale(0.98)';
      setTimeout(() => {
        window.location.href = 'photostrip.html';
      }, 300);
    });

    document.getElementById('skipBtn').addEventListener('click', () => {
      const btn = document.getElementById('skipBtn');
      btn.style.transform = 'scale(0.98)';
      setTimeout(() => {
        window.location.href = 'end.html';
      }, 300);
    });
  </script>

  <script src="../shared/shared.js"></script>
<script>initNav();</script>


</body>
</html>
