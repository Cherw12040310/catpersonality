<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Probablyy a cat — End</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../shared/shared.css">
  <style>
    .cat-stack {
  position: relative;
  width: clamp(260px, 65vw, 460px);
  height: clamp(180px, 42vw, 300px);
  margin-bottom: clamp(8px, 2vh, 20px);
  display: flex;
  justify-content: center;
  align-items: center;
}

    .cat-stack-img {
      position: absolute;
      width: clamp(110px, 28vw, 200px);
      height: clamp(110px, 28vw, 200px);
      border-radius: clamp(14px, 3vw, 28px);
      object-fit: cover;
      border: 3px solid #fff;
      opacity: 0;
    }

    .cat-stack-img:nth-child(1) {
      left: 0;
      top: clamp(20px, 5vw, 40px);
      transform: rotate(-8deg);
      animation: cardFan 0.7s 0.3s cubic-bezier(0.34,1.56,0.64,1) forwards;
      z-index: 1;
    }

    .cat-stack-img:nth-child(2) {
      left: clamp(60px, 14vw, 110px);
      top: clamp(30px, 8vw, 60px);
      transform: rotate(0deg);
      animation: cardFanCenter 0.7s 0.5s cubic-bezier(0.34,1.56,0.64,1) forwards;
      z-index: 2;
    }

    .cat-stack-img:nth-child(3) {
      left: clamp(120px, 28vw, 220px);
      top: 0;
      transform: rotate(8deg);
      animation: cardFanRight 0.7s 0.7s cubic-bezier(0.34,1.56,0.64,1) forwards;
      z-index: 3;
    }

    .congrats-text {
      font-size: clamp(16px, 3.8vw, 38px);
      font-weight: 600;
      color: #f0ece8;
      text-align: center;
      line-height: 1.4;
      opacity: 0;
      animation: fadeUp 0.6s 0.8s ease forwards;
    }

    .sub-text {
      font-size: clamp(14px, 3.2vw, 32px);
      font-weight: 400;
      color: #f0ece8;
      text-align: center;
      line-height: 1.5;
      opacity: 0;
      animation: fadeUp 0.6s 1.0s ease forwards;
    }

    .home-btn {
      width: 100%;
      background: #ffffff;
      border: none;
      border-radius: 20px;
      padding: clamp(14px, 2.5vh, 24px) clamp(20px, 4vw, 40px);
      font-family: 'Outfit', sans-serif;
      font-size: clamp(16px, 3.5vw, 32px);
      font-weight: 500;
      color: #111;
      cursor: pointer;
      transition: background 0.2s ease, transform 0.15s ease;
      opacity: 0;
      animation: fadeUp 0.6s 1.2s ease forwards;
    }

    .home-btn:hover  { background: #e8e8e8; }
    .home-btn:active { background: #c8c8c8; transform: scale(0.98); }

    .countdown-bar-wrap {
      width: 100%;
      height: 4px;
      background: #2a2a2a;
      border-radius: 999px;
      overflow: hidden;
      opacity: 0;
      animation: fadeUp 0.6s 1.4s ease forwards;
    }

    .countdown-bar {
      height: 100%;
      background: #f0ece8;
      border-radius: 999px;
      width: 100%;
      animation: drainBar 60s 1.5s linear forwards;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes cardFan {
      from { opacity: 0; transform: rotate(0deg) translateY(30px) scale(0.8); }
      to   { opacity: 1; transform: rotate(-8deg) translateY(0) scale(1); }
    }

    @keyframes cardFanCenter {
      from { opacity: 0; transform: rotate(0deg) translateY(30px) scale(0.8); }
      to   { opacity: 1; transform: rotate(0deg) translateY(0) scale(1); }
    }

    @keyframes cardFanRight {
      from { opacity: 0; transform: rotate(0deg) translateY(30px) scale(0.8); }
      to   { opacity: 1; transform: rotate(8deg) translateY(0) scale(1); }
    }

    @keyframes drainBar {
      from { width: 100%; }
      to   { width: 0%; }
    }
  </style>
</head>
<body>

<img src="../images/ui/1.svg" class="bg-image" alt="">
  <div class="progress-path" id="navPath"></div>

  <div class="page">
    <div class="outer-card">

      <div class="cat-stack">
        <img class="cat-stack-img" id="catCard1" src="" alt="cat">
        <img class="cat-stack-img" id="catCard2" src="" alt="cat">
        <img class="cat-stack-img" id="catCard3" src="" alt="cat">
      </div>

      <p class="congrats-text">Congrats you made it to the<br>end of the journey.</p>
      <p class="sub-text">Go collect your personalized cat postcard at the station and feel free to play with AR with your phone</p>

      <button class="home-btn" id="homeBtn">Home</button>

      <div class="countdown-bar-wrap">
        <div class="countdown-bar"></div>
      </div>

    </div>
  </div>

  <script>


    const ALL_CATS = {
      american_shorthair: '../images/cats/americanshorthair.JPG',
      british_shorthair:  '../images/cats/britishshorthair.JPG',
      maincoon:           '../images/cats/mainecoon.JPG',
      birman:             '../images/cats/birman.JPG',
      ragdoll:            '../images/cats/ragdoll.JPG',
      tabby:              '../images/cats/tabby.JPG',
      tuxedo:             '../images/cats/tuxedo.JPG'
    };

    document.getElementById('catCard1').src = ALL_CATS['american_shorthair'];
    document.getElementById('catCard2').src = ALL_CATS['birman'];
    document.getElementById('catCard3').src = ALL_CATS['tuxedo'];

    document.getElementById('homeBtn').addEventListener('click', () => {
      window.location.href = '../onboarding/index.html';
    });

    setTimeout(() => {
      window.location.href = '../onboarding/index.html';
    }, 60000);
  </script>
<script src="../shared/shared.js"></script>
<script>initNav();</script>
</body>
</html>
