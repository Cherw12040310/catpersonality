<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Probablyy a cat — Result</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../shared/shared.css">
  <link rel="stylesheet" href="result.css">
</head>
<body>

  <img src="../images/ui/1.svg" class="bg-image" alt="">

  <div class="progress-path" id="navPath"></div>

  <div class="page">

    <div class="title-wrap" id="titleWrap">
      <p class="result-subtitle">You are match with a</p>
      <h1 class="result-name" id="catName">...</h1>
    </div>

    <div class="card-stack" id="cardStack">

      <div class="result-card personality-card" id="personalityCard">
        <div class="personality-inner">
          <p class="personality-label">lifestyle habits</p>
          <div class="traits-list" id="traitsList"></div>
        </div>
      </div>

      <div class="result-card cat-card" id="catCard">
        <div id="doodleLayer"></div>
        <img class="cat-full-img" id="catImg" src="" alt="cat">
      </div>

    </div>

    <p class="swipe-hint" id="swipeHint">swipe to reveal</p>

    <button class="continue-btn" id="continueBtn">continue</button>

  </div>

  <script src="../shared/shared.js"></script>
  <script src="result.js"></script>
  <script>initNav();</script>

</body>
</html>
